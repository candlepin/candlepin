services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: candlepin
      POSTGRES_PASSWORD: candlepin
      POSTGRES_DB: candlepin
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candlepin -d candlepin"]
      interval: 2s
      timeout: 5s
      retries: 10

  candlepin:
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ./containers/active-dev/cs10.Containerfile
      args:
      - WAR_FILE=${WAR_FILE}
    ports:
      - "${CP_PORT:-8443}:8443"
      - "${CP_DEBUG_PORT:-8000}:8000"
    healthcheck:
      test: curl --fail -k https://localhost:8443/candlepin/status
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
