services:
  mariadb:
    image: mariadb:10.6.14
    command: --transaction-isolation=READ-COMMITTED --innodb-print-all-deadlocks=ON
    environment:
      MARIADB_USER: candlepin
      MARIADB_PASSWORD: candlepin
      MARIADB_DATABASE: candlepin
      MARIADB_ROOT_PASSWORD: candlepin
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -ucandlepin -pcandlepin"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      broker-net:

  broker:
    image: apache/activemq-artemis:latest
    ports:
      - "61616:61616"
      - "8161:8161"
    environment:
      ANONYMOUS_LOGIN: true
      ARTEMIS_JOURNAL_TYPE: NIO
    volumes:
      - ./broker.xml:/var/lib/artemis-instance/etc-override/broker.xml:z
    networks:
      broker-net:
        ipv4_address: 172.30.0.10

  candlepin:
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ./containers/active-dev/cs10.Containerfile
      args:
      - WAR_FILE=${WAR_FILE}
    ports:
      - "${CP_PORT:-8443}:8443"
      - "${CP_DEBUG_PORT:-8000}:8000"
    environment:
      CANDLEPIN_AUDIT_HORNETQ_EMBEDDED: "false"
      CANDLEPIN_AUDIT_HORNETQ_BROKER_URL: tcp://172.30.0.10:61616?sslEnabled=false&ha=true&retryInterval=1000&retryIntervalMultiplier=1.5&reconnectAttempts=1000&consumerWindowSize=0
    healthcheck:
      test: curl --fail -k https://localhost:8443/candlepin/status
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      broker-net:
    depends_on:
      mariadb:
        condition: service_healthy
      broker:
        condition: service_started

networks:
  broker-net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
