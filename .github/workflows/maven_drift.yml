---
name: Maven build drift

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  maven_drift:
    name: maven drift
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        shell: bash
        run: sudo apt-get install -y gettext git-core

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Rebase
        uses: ./.github/actions/rebase

      - name: Set Environment Variables
        uses: ./.github/actions/set_vars
        with:
          varFilePath: ./.github/variables/pr_verification.env

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build Gradle WAR and API JAR
        run: ./gradlew war apiJar

      - name: Build Maven WAR and API JAR
        run: |
          ./gradlew generatePom
          mvn package -f pom.xml

      - name: Compare WAR contents
        run: |
          mkdir -p /tmp/gradle-war /tmp/maven-war
          unzip -q build/libs/candlepin.war -d /tmp/gradle-war
          unzip -q maven/war/target/candlepin*.war -d /tmp/maven-war

          (cd /tmp/gradle-war && find WEB-INF/ -type f -printf '%s %p\n' | sort -k2) > /tmp/gradle_war_content
          (cd /tmp/maven-war && find WEB-INF/ -type f -printf '%s %p\n' | sort -k2) > /tmp/maven_war_content

          echo "::group::WAR diff"
          diff /tmp/gradle_war_content /tmp/maven_war_content || {
            echo "::endgroup::"
            echo "::error::WAR contents differ between Gradle and Maven builds"
            exit 1
          }
          echo "::endgroup::"
          echo "WAR contents match"

      - name: Compare API JAR contents
        run: |
          mkdir -p /tmp/gradle-jar /tmp/maven-jar
          unzip -q build/libs/candlepin-api-*.jar -d /tmp/gradle-jar
          unzip -q maven/api/target/candlepin-api-*.jar -d /tmp/maven-jar

          (cd /tmp/gradle-jar && find org/ -type f -printf '%s %p\n' | sort -k2) > /tmp/gradle_jar_content
          (cd /tmp/maven-jar && find org/ -type f -printf '%s %p\n' | sort -k2) > /tmp/maven_jar_content

          echo "::group::API JAR diff"
          diff /tmp/gradle_jar_content /tmp/maven_jar_content || {
            echo "::endgroup::"
            echo "::error::API JAR contents differ between Gradle and Maven builds"
            exit 1
          }
          echo "::endgroup::"
          echo "API JAR contents match"
