---
name: Run spec tests

on:
  pull_request:
  workflow_dispatch:

# Cancel in-progress PR verification workflows. We only care about verifying the latest commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  TOMCAT_VERSION: 10.1.49
  BUILD_CONTEXT: ${{ github.workspace }}

jobs:
  spec_tests:
    name: spec tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        database: [postgres, mariadb]
        mode: [standalone, hosted]

    steps:
      - name: Install dependencies
        shell: bash
        run: sudo apt-get install -y gettext git-core

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Rebase
        uses: ./.github/actions/rebase

      - name: Set Environment Variables
        uses: ./.github/actions/set_vars
        with:
          varFilePath: ./.github/variables/pr_verification.env

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Candlepin war file
        run: ./gradlew war -Ptest_extensions=hostedtest,manifestgen

      - name: Generate Candlepin configuration
        shell: bash
        run: |
          CONF_ARGS="-Pdb_host=${{ matrix.database }} -Pmanifestgen=true -Pcpdb_password=candlepin"
          if [ "${{ matrix.database }}" == "mariadb" ]; then
            CONF_ARGS="$CONF_ARGS -Pdatabase_server=mysql"
          fi
          if [ "${{ matrix.mode }}" == "hosted" ]; then
            CONF_ARGS="$CONF_ARGS -Phostedtest=true"
          fi
          ./gradlew generateConfig $CONF_ARGS
          if [ ! -s ./build/candlepin.conf ]; then
            echo "ERROR: generateConfig did not produce build/candlepin.conf" >&2
            exit 1
          fi

      - uses: actions/cache/restore@v6
        id: restore-tomcat
        with:
          path: apache-tomcat-${{ env.TOMCAT_VERSION }}.tar.gz
          key: tomcat-${{ env.TOMCAT_VERSION }}

      - name: Ensure Tomcat Artifact
        run: |
          if [ ! -f apache-tomcat-${{ env.TOMCAT_VERSION }}.tar.gz ]; then
            wget --max-redirect=0 https://archive.apache.org/dist/tomcat/tomcat-10/v${{ env.TOMCAT_VERSION }}/bin/apache-tomcat-${{ env.TOMCAT_VERSION }}.tar.gz \
                -O apache-tomcat-${{ env.TOMCAT_VERSION }}.tar.gz
          fi

      - uses: actions/cache/save@v6
        if: steps.restore-tomcat.outputs.cache-matched-key == '' # If cache is not present save tomcat to cache
        with:
          path: apache-tomcat-${{ env.TOMCAT_VERSION }}.tar.gz
          key: tomcat-${{ env.TOMCAT_VERSION }}

      - name: Create Candlepin and database containers
        shell: bash
        run: |
          WAR_FILE=build/libs/candlepin.war
          echo "WAR_FILE=$WAR_FILE" > ./containers/.env
          docker compose -f ./containers/active-dev/${{ matrix.database }}.docker-compose.yml --env-file ./containers/.env up -d --wait

      - name: Run Spec tests
        run: ./gradlew spec
        env:
          MYSQL_IN_USE: ${{ matrix.database == 'mariadb' }}

      - name: Collect docker logs on failure
        if: failure()
        uses: jwalton/gh-docker-logs@2741064ab9d7af54b0b1ffb6076cf64c16f0220e
        with:
          dest: './logs-${{ matrix.database }}-${{ matrix.mode }}'

      - name: Collect candlepin and Tomcat logs on failure
        if: failure()
        shell: bash
        run: |
          docker compose -f ./containers/active-dev/${{ matrix.database }}.docker-compose.yml cp candlepin:/var/log/candlepin/ ./logs-${{ matrix.database }}-${{ matrix.mode }}/candlepin/
          docker compose -f ./containers/active-dev/${{ matrix.database }}.docker-compose.yml cp candlepin:/opt/tomcat/logs/ ./logs-${{ matrix.database }}-${{ matrix.mode }}/tomcat/

      - name: Collect postgress logs on failure
        if: failure() && matrix.database == 'postgres'
        run: docker compose -f ./containers/active-dev/postgres.docker-compose.yml cp postgres:/var/log/postgresql/ ./logs-${{ matrix.database }}-${{ matrix.mode }}/postgresql/

      - name: Collect mariadb logs on failure
        if: failure() && matrix.database == 'mariadb'
        run: docker compose -f ./containers/active-dev/mariadb.docker-compose.yml cp mariadb:/var/log/mysql/ ./logs-${{ matrix.database }}-${{ matrix.mode }}/mysql/

      - name: Tar logs
        if: failure()
        run: sudo tar cvzf ./logs-${{ matrix.database }}-${{ matrix.mode }}.tgz ./logs-${{ matrix.database }}-${{ matrix.mode }}

      - name: Upload logs to GitHub
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs-${{ matrix.database }}-${{ matrix.mode }}.tgz
          path: ./logs-${{ matrix.database }}-${{ matrix.mode }}.tgz

      - if: always()
        name: Stop containers
        shell: bash
        run: docker compose -f ./containers/active-dev/${{ matrix.database }}.docker-compose.yml down
