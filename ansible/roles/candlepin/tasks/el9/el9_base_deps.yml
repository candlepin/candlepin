---
- name: "Disable SELinux"
  become: true
  ansible.posix.selinux:
    state: disabled
  tags:
    - system
    - candlepin

- name: "Update system packages"
  become: true
  ansible.builtin.dnf:
    name: "*"
    state: latest
    allowerasing: true
  tags:
    - system
    - system_update
    - candlepin

- name: "Install EPEL repository"
  become: true
  ansible.builtin.dnf:
    name: epel-release
    state: present
  tags:
    - base_deps
    - candlepin

- name: "Install Candlepin requirements"
  become: true
  ansible.builtin.package:
    name:
      - createrepo_c
      - gcc
      - gettext
      - git
      - java-25-openjdk-devel
      - make
      - openssl
      - tomcat-native
      - platform-python
      - python3
      - python3-libxml2
      - python3-requests
      - rpm-build
      - rpm-sign
      - unzip
      - wget
      - zlib
      - zlib-devel
    state: present
  tags:
    - base_deps
    - candlepin

- name: "Check if Tomcat is already installed"
  ansible.builtin.stat:
    path: "/var/lib/tomcat/bin/catalina.sh"
  register: tomcat_installed

- name: "Download and install Tomcat"
  when: not tomcat_installed.stat.exists
  become: true
  block:
    - name: "Download Tomcat"
      ansible.builtin.get_url:
        url: "https://archive.apache.org/dist/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        checksum: "sha512:https://archive.apache.org/dist/tomcat/tomcat-10/v{{ tomcat_version }}/bin/apache-tomcat-{{ tomcat_version }}.tar.gz.sha512"

    - name: "Create /var/lib/tomcat directory"
      ansible.builtin.file:
        path: "/var/lib/tomcat"
        state: directory
        mode: 0755

    - name: "Extract"
      ansible.builtin.unarchive:
        src: "/tmp/apache-tomcat-{{ tomcat_version }}.tar.gz"
        dest: "/var/lib/tomcat"
        remote_src: yes
        extra_opts:
          - --strip-components=1

    - name: "Create /etc/tomcat directory"
      ansible.builtin.file:
        path: "/etc/tomcat"
        state: directory
        mode: 0755

    - name: "Copy server.xml file"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.github/containers/server.xml"
        dest: "/etc/tomcat/server.xml"
        mode: 0755

    - name: "Create server.xml symlink"
      ansible.builtin.file:
        src: "/etc/tomcat/server.xml"
        dest: "/var/lib/tomcat/conf/server.xml"
        state: link
        force: yes

    - name: "Create /var/cache/tomcat/temp directory"
      ansible.builtin.file:
        path: "/var/cache/tomcat/temp"
        state: directory
        mode: 0755

    - name: "Find libssl.so version"
      ansible.builtin.find:
        paths: /usr/lib64
        patterns: 'libssl.so.3*'
        file_type: file
      register: libssl_files

    - name: "Create libssl.so symlink"
      ansible.builtin.file:
        src: "{{ libssl_files.files[0].path }}"
        dest: "/usr/lib64/libssl.so"
        state: link
      when: libssl_files.files | length > 0

    - name: "Create tomcat group"
      ansible.builtin.group:
        name: tomcat
        gid: 10000
        state: present

    - name: "Create tomcat user"
      ansible.builtin.user:
        name: tomcat
        uid: 10001
        group: tomcat
        shell: /sbin/nologin
        create_home: no
        state: present

    - name: "Add vagrant user to tomcat group"
      ansible.builtin.user:
        name: vagrant
        groups: tomcat
        append: yes

    - name: Set Tomcat directory permissions
      ansible.builtin.file:
        path: "/var/lib/tomcat"
        owner: tomcat
        group: tomcat
        recurse: yes

    - name: "Create tomcat.conf file"
      ansible.builtin.copy:
        dest: "/var/lib/tomcat/tomcat.conf"
        content: |
          TOMCAT_CFG_LOADED="1"
          TOMCATS_BASE="/var/lib/tomcats/"
          JAVA_HOME="/usr/lib/jvm/java-25-openjdk"
          CATALINA_HOME="/var/lib/tomcat"
          CATALINA_TMPDIR="/var/cache/tomcat/temp"
          SECURITY_MANAGER="false"
        mode: 0755

    - name: "Create tomcat systemd service file"
      ansible.builtin.copy:
        dest: /etc/systemd/system/tomcat.service
        content: |
          [Service]
          Type=simple

          EnvironmentFile=/var/lib/tomcat/tomcat.conf
          ExecStart=/var/lib/tomcat/bin/catalina.sh run
          ExecStop=/var/lib/tomcat/bin/catalina.sh stop
          SuccessExitStatus=143
          User=tomcat

          [Install]
          WantedBy=multi-user.target

- name: "Enable post-quantum crypto policy"
  become: true
  ansible.builtin.command: update-crypto-policies --set DEFAULT:PQ
  changed_when: true
  tags:
    - base_deps
    - candlepin

# Impl note:
# The invocations of alternatives need to be run in the context of the original user, but with
# root permissions. Using become and the raw shell command invokes these in root's environment,
# which will fail at best, or silently map the wrong command at worst.
- name: "Configure alternatives: java"
  ansible.builtin.shell: sh -c 'sudo alternatives --install /usr/bin/java java /usr/lib/jvm/java-25-openjdk-*/bin/java 1'
  changed_when: false
  tags:
    - base_deps
    - candlepin

- name: "Configure alternatives: javac"
  ansible.builtin.shell: sh -c 'sudo alternatives --install /usr/bin/javac javac /usr/lib/jvm/java-25-openjdk-*/bin/javac 1'
  changed_when: false
  tags:
    - base_deps
    - candlepin

- name: "Enable necessary ports in firewalld"
  become: true
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    state: enabled
    permanent: true
    offline: false
  with_items:
    - 22
    - 443
    - 8080    # Candlepin Tomcat server
    - 8443    # ^
  when:
    - "'services' in ansible_facts"
    - "'firewalld.service' in ansible_facts.services"
  tags:
    - system
    - candlepin
