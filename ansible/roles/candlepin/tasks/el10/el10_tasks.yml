---
- name: "Include base deps tasks"
  ansible.builtin.import_tasks: el10_base_deps.yml

- name: "Include postgresql tasks"
  ansible.builtin.import_tasks: el10_postgresql.yml
  when:
    - cp_configure_postgresql | bool

- name: "Include mariadb tasks"
  ansible.builtin.import_tasks: el10_mariadb.yml
  when:
    - cp_configure_mariadb | bool
