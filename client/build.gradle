plugins {
    alias(libs.plugins.openapi.generator)
    id "java-library"
    id "java"
}

description = "Candlepin Generated Client Library"

repositories {
    mavenCentral()
}

dependencies {
    implementation(libs.commons.lang)
    implementation(libs.gson)
    implementation(libs.gsonfire)
    implementation(libs.javax.annotation)
    implementation(libs.javax.rs)
    implementation(libs.okhttp)
    implementation(libs.okhttp.interceptor)
    implementation(libs.openapi.databind.nullable)
    implementation(libs.spotbugs)
    implementation(libs.swagger)
}

sourceSets.main.java.srcDirs = [
        "src/main/java",
        "${buildDir}/generated/src/main/java"
]
compileJava.dependsOn tasks.openApiGenerate

openApiGenerate {
    inputSpec = rootProject.layout.projectDirectory.file("api/candlepin-api-spec.yaml")
    outputDir = layout.buildDirectory.dir("generated")
    configFile = rootProject.layout.projectDirectory.file("api/candlepin-api-config.json")
    generatorName = "java"
    validateSpec = true
    skipValidateSpec = true
    configOptions = [
        dateLibrary: "java8",
        containerDefaultToNull: "true"
    ]
    modelPackage = "org.candlepin.dto.api.client.v1"
    apiPackage = "org.candlepin.resource.client.v1"
    invokerPackage = "org.candlepin.invoker.client"
    additionalProperties = [
        useRuntimeException: true
    ]
}
